<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Suggest</title>
    <link rel="stylesheet" href="../CSS/autosuggest.css">
</head>
<body>
    <span class="gear">&#9881</span>

    <span class="pill">
         &#8226 Online | &#128337 ms
    </span>

    <div class="maincontent">
    <h1><span id="logo">Lakshmi</span><span id="element"></span></h1>
    <p>One million phrases. Four algorithms. Prefix based Auto Suggest.</p>

    <div>
    <span class="lens">&#128269</span>
    <input type="text" id="search" placeholder="Start typing to search">
    </div>
    </div>
    <div id="search-suggestions"></div>



    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script>
    var typed = new Typed('#element', {
      strings: ["Vaishnavi"],
      typeSpeed: 50,
    });
  </script>

  <script src="../js/autosuggest.js"></script></script>

</body>
</html>
